---
name: packwiz export

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Packwiz refresh
        run: packwiz refresh --build --pack-file pack/pack.toml

      - name: Export standalone packs
        run: |
          mkdir out
          cd out
          packwiz modrinth export --pack-file ../pack/pack.toml
          packwiz curseforge export --pack-file ../pack/pack.toml

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} out/*
